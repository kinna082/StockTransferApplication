# Azure CI/CD — Stock Transfer Application (.NET 8 API + Vite/React frontend build)
#
# Prerequisites (GitHub → Settings → Secrets and variables → Actions):
#
#   Secrets (API deploy via azure/login):
#     AZUREAPPSERVICE_CLIENTID_08CC96C30D0B455B9241E7AE5EBC43DB
#     AZUREAPPSERVICE_TENANTID_D2A07C45ECC54F658DF7C7438D6F804B
#     AZUREAPPSERVICE_SUBSCRIPTIONID_DDB4000B00214220AF858651C2367258
#
#   Variables (Repository → Variables):
#     AZURE_WEBAPP_NAME              — API App Service name (e.g. stocktransfer-api)
#     VITE_API_BASE_URL              — public API base URL for frontend build, e.g. https://stocktransfer-api.azurewebsites.net/api
#
#   Secrets (Azure Static Web Apps — deploy frontend):
#     AZURE_STATIC_WEB_APPS_API_TOKEN
#       Portal → your Static Web App → Manage deployment token → copy value into this repo secret.
#
# Frontend: `build-and-test` produces `frontend/dist` → artifact `frontend-dist`. Job `deploy-frontend`
# uploads that folder to SWA (pre-built; Oryx build skipped). SPA routing: `frontend/public/staticwebapp.config.json`.
#
# Azure resources:
#   - App Service for StockTransfer.Api (.NET 8)
#   - Azure SQL Database + connection string / JWT in App Service Configuration
#
# Optional: App Service publish profile deploy instead of OIDC:
#   https://learn.microsoft.com/en-us/azure/app-service/deploy-github-actions

name: Azure CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Required for azure/login OIDC: GitHub must issue the job OIDC token (ACTIONS_ID_TOKEN_REQUEST_URL).
# Workflow-level permissions match https://github.com/Azure/login#login-with-openid-connect-oidc-recommended
permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20.x"
  SOLUTION_FILE: StockTransfer.sln
  API_PROJECT_FILE: src/StockTransfer.Api/StockTransfer.Api.csproj

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify solution file exists
        run: |
          if [ ! -f "backend/${{ env.SOLUTION_FILE }}" ]; then
            echo "::error::Expected backend/${{ env.SOLUTION_FILE }} — check repo layout (is the solution in a subfolder or named differently?)"
            ls -la
            ls -la backend 2>/dev/null || true
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        working-directory: backend
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        working-directory: backend
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore -c Release

      - name: Test
        working-directory: backend
        run: dotnet test ${{ env.SOLUTION_FILE }} --no-build -c Release --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5080/api' }}
        run: npm run build

      - name: Publish API package
        working-directory: backend
        run: dotnet publish ${{ env.API_PROJECT_FILE }} -c Release -o "${{ github.workspace }}/artifacts/api"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: artifacts/api

      - name: Upload frontend artifact (SWA deploy + optional download)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy-api:
    name: Deploy API (App Service)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: api

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_08CC96C30D0B455B9241E7AE5EBC43DB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D2A07C45ECC54F658DF7C7438D6F804B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DDB4000B00214220AF858651C2367258 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: api

  deploy-frontend:
    name: Deploy frontend (Azure Static Web Apps)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: upload
          app_location: dist
          api_location: ""
          skip_app_build: true
