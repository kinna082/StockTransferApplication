# Azure CI/CD — Stock Transfer Application (.NET 8 API + Vite/React frontend)
#
# Prerequisites (GitHub → Settings → Secrets and variables → Actions):
#
#   Secrets (Deploy):
#     AZURE_WEBAPP_PUBLISH_PROFILE   — contents of the API App Service *.PublishSettings file (download from Azure Portal)
#     AZURE_STATIC_WEB_APPS_API_TOKEN — deployment token from Azure Static Web App → Manage deployment token
#
#   Variables (Repository → Variables) — recommended:
#     AZURE_WEBAPP_NAME              — API App Service name (e.g. stocktransfer-api)
#     VITE_API_BASE_URL              — public API base URL for frontend build, e.g. https://stocktransfer-api.azurewebsites.net/api
#
# Azure resources to create first:
#   - App Service (Windows or Linux) for StockTransfer.Api, .NET 8 stack
#   - Azure Static Web App (or host frontend on App Service / Storage instead and replace the SWA deploy step)
#   - Azure SQL Database + connection string / JWT settings in App Service Configuration
#
# Optional: replace publish-profile auth with OIDC (no long-lived secret):
#   https://learn.microsoft.com/en-us/azure/app-service/deploy-github-actions

name: Azure CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20.x"
  SOLUTION_PATH: backend/StockTransfer.sln
  API_PROJECT_PATH: backend/src/StockTransfer.Api/StockTransfer.Api.csproj

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore -c Release

      - name: Test
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-build -c Release --verbosity normal

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://localhost:5080/api' }}
        run: npm run build

      - name: Publish API package
        run: dotnet publish ${{ env.API_PROJECT_PATH }} -c Release -o "${{ github.workspace }}/artifacts/api"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: artifacts/api

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy-api:
    name: Deploy API (App Service)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: api

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: api

  deploy-frontend:
    name: Deploy frontend (Static Web Apps)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          api_location: ""
          skip_app_build: true
