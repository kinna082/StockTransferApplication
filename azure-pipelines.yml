# Azure DevOps — build, test, publish artifacts, deploy API to App Service
#
# Set these in Pipeline → Variables (or variable group):
#   AzureWebAppName          — App Service name
#   ViteApiBaseUrl           — e.g. https://YOUR-API.azurewebsites.net/api (used at frontend build)
#
# Variable AzureServiceConnection = name of your Azure Resource Manager service connection.
# Optional: add AzureStaticWebApp task for frontend/dist using your Static Web App token.

trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  backendFolder: backend
  solutionFile: StockTransfer.sln
  apiProjectFile: src/StockTransfer.Api/StockTransfer.Api.csproj

stages:
  - stage: CI
    jobs:
      - job: Build
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: sdk
              version: 8.0.x

          - script: |
              set -e
              test -f "$(backendFolder)/$(solutionFile)" || { echo "Missing $(backendFolder)/$(solutionFile)"; ls -la; exit 1; }
            displayName: Verify solution exists

          - script: dotnet restore $(solutionFile) && dotnet build $(solutionFile) --no-restore -c $(buildConfiguration)
            displayName: Restore and build
            workingDirectory: $(Build.SourcesDirectory)/$(backendFolder)

          - script: dotnet test $(solutionFile) --no-build -c $(buildConfiguration) --verbosity normal
            displayName: Test
            workingDirectory: $(Build.SourcesDirectory)/$(backendFolder)

          - task: NodeTool@0
            inputs:
              versionSpec: 20.x

          - script: cd frontend && npm ci && npm run build
            displayName: Frontend build
            env:
              VITE_API_BASE_URL: $(ViteApiBaseUrl)

          - script: dotnet publish $(apiProjectFile) -c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)/api
            displayName: Publish API
            workingDirectory: $(Build.SourcesDirectory)/$(backendFolder)

          - publish: $(Build.ArtifactStagingDirectory)/api
            artifact: api-publish

          - publish: frontend/dist
            artifact: frontend-dist

  - stage: DeployApi
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: WebDeploy
        steps:
          - download: current
            artifact: api-publish
          - task: AzureWebApp@1
            inputs:
              azureSubscription: $(AzureServiceConnection)
              appName: $(AzureWebAppName)
              package: $(Pipeline.Workspace)/api-publish
